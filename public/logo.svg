<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6821f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e06b0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background rounded square (PWA icon shape) -->
  <rect 
    x="16" 
    y="16" 
    width="480" 
    height="480" 
    rx="96" 
    ry="96" 
    fill="url(#bgGradient)"
    filter="url(#shadow)"
  />
  
  <!-- Subtle inner border -->
  <rect 
    x="24" 
    y="24" 
    width="464" 
    height="464" 
    rx="88" 
    ry="88" 
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    stroke-opacity="0.2"
  />
  
  <!-- Circle background for play button -->
  <circle 
    cx="256" 
    cy="256" 
    r="140" 
    fill="#ffffff"
    fill-opacity="0.15"
  />
  
  <!-- Play button triangle (Lucide-react style) -->
  <g filter="url(#innerShadow)">
    <path 
      d="M206 152 L206 360 L376 256 Z" 
      fill="url(#playGradient)"
      stroke="#ffffff"
      stroke-width="8"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
  </g>
  
  <!-- Lucide-style play icon with rounded corners -->
  <path 
    d="M212 168 
       L212 344 
       C212 352 218 358 226 354 
       L362 262 
       C370 258 370 254 362 250 
       L226 158 
       C218 154 212 160 212 168 Z" 
    fill="url(#playGradient)"
    stroke="none"
  />
  
  <!-- Highlight reflection -->
  <ellipse 
    cx="256" 
    cy="140" 
    rx="120" 
    ry="60" 
    fill="#ffffff"
    fill-opacity="0.1"
  />
</svg>